snippets:
    - name: git status
      keyword: gst
      snippet: git status --short --branch
    - name: git add
      keyword: ga
      snippet: git add {{file}}
    - name: git commit message
      keyword: gcim
      snippet: git commit -m '{{commit_message}}'
    - name: git push
      keyword: gp
      snippet: git push
    - name: git switch
      keyword: gsw
      snippet: git switch {{branch}}
    - name: git log
      keyword: gl
      snippet: git log
    - name: branch
      keyword: B
      snippet: git symbolic-ref --short HEAD
      context:
        lbuffer: '^git\s+checkout\s+'
      evaluate: true
    - name: chezmoi add
      keyword: cza
      snippet: chezmoi add {{file}}
    - name: chezmoi cd
      keyword: ccd
      snippet: chezmoi cd
completions:
  - name: kill pid
    patterns:
      - "^kill( .*)? $"
    sourceCommand: "git branch -vv"
    options:
        --prompt: "'Git Branch > '"
